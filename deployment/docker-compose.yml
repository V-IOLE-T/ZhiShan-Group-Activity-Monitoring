version: '3.8'

services:
  feishu-monitor:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: feishu-activity-monitor
    restart: always
    env_file:
      - ../config/.env
    volumes:
      - ../logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
